<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HistoryPro | Interaktives Lernen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1012;
            --bg-panel: #1a1b1e;
            --border: #2c2e33;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text: #9ca3af;
            --text-light: #f3f4f6;
            --danger: #ef4444;
            --accent-ottonen: #d4af37;
            --accent-war: #ef4444;
            --success: #10b981;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark); color: var(--text);
            overflow-x: hidden;
        }

        /* Technisches Raster & Partikel */
        canvas#bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .tech-grid {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        /* Homescreen */
        #homescreen {
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle at center, #1a1b1e 0%, #000 100%);
            transition: opacity 0.5s ease;
        }

        .glass-container {
            width: 900px; max-width: 95vw; background: rgba(20, 20, 23, 0.7);
            backdrop-filter: blur(25px) saturate(180%); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            text-align: center;
        }

        .title-gradient {
            font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 40px; }
        @media (max-width: 600px) { .btn-grid { grid-template-columns: 1fr; } }

        .topic-card {
            background: var(--bg-panel); border: 1px solid var(--border);
            padding: 35px; border-radius: 20px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .topic-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary); 
            box-shadow: 0 15px 40px var(--primary-glow);
            background: rgba(59, 130, 246, 0.05);
        }
        .topic-card strong { font-size: 1.4rem; color: white; }
        .topic-card i { font-style: normal; font-size: 3rem; }

        /* App Interface */
        #app-interface { display: none; }
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(26, 27, 30, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 30px; z-index: 1000;
            justify-content: space-between; box-sizing: border-box;
        }

        .main-layout { display: flex; margin-top: 65px; height: calc(100vh - 65px); }

        .sidebar {
            width: 320px; background: var(--bg-panel); border-right: 1px solid var(--border);
            overflow-y: auto; padding: 20px; flex-shrink: 0;
        }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 40px; background: #0c0d0f; }

        /* Inhalts-Styles */
        .card {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 30px; margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .card h2 { color: white; margin-top: 0; border-left: 5px solid var(--primary); padding-left: 20px; font-size: 1.8rem; }
        .card h3 { color: var(--primary); margin-top: 30px; font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .info-block { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #4b5563; }
        .important { color: var(--danger); font-weight: 700; }
        .highlight { color: var(--primary); font-weight: 600; }

        /* Stammbaum */
        .stammbaum-wrap { overflow-x: auto; background: #000; padding: 30px; border-radius: 12px; border: 1px solid var(--accent-ottonen); margin: 20px 0; }
        .node { 
            border: 1px solid var(--accent-ottonen); padding: 12px; margin: 10px; 
            display: inline-block; border-radius: 8px; background: rgba(212, 175, 55, 0.05);
            font-size: 13px; text-align: center; color: white; min-width: 140px;
        }
        .node.king { border-width: 2px; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); background: rgba(212, 175, 55, 0.15); }

        /* Quiz - Kleines Quiz (im Lernmodus) */
        .quiz-card { background: #1a1b1e; border: 1px solid var(--primary); border-radius: 16px; padding: 30px; }
        .quiz-opt {
            width: 100%; padding: 18px; margin: 12px 0; background: #27272a;
            border: 1px solid var(--border); border-radius: 12px; color: white;
            text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .quiz-opt:hover { border-color: var(--primary); background: #323235; }
        .correct { background: var(--success) !important; border-color: var(--success); }
        .wrong { background: var(--danger) !important; border-color: var(--danger); }

        /* --- NEU: STYLES FÜR DEN PRÜFUNGSMODUS --- */
        .exam-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .exam-question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.5;
            color: #fff;
        }

        .exam-opt {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            background: #2a2b30;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #e5e7eb;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .exam-opt:hover {
            background: #323338;
            border-color: var(--primary);
        }

        .exam-opt.selected-correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
        }

        .exam-opt.selected-wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
        }

        .explanation-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #d1d5db;
            text-align: left;
        }

        .next-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .next-btn:hover {
            filter: brightness(1.1);
        }

        /* Ergebnis Screen */
        .result-score { font-size: 4rem; font-weight: 800; margin: 20px 0; }
        .pass { color: var(--success); }
        .fail { color: var(--danger); }


        .nav-item {
            padding: 12px 15px; margin-bottom: 8px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; color: var(--text); font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); border-color: var(--primary); font-weight: 600; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="tech-grid"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="homescreen">
        <div class="glass-container">
            <h1 class="title-gradient">HistoryPro</h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">Vollständiges Kompendium & Interaktive Analyse</p>
            <div class="btn-grid">
                <div class="topic-card" onclick="startApp('ottonen')">
                    <i>👑</i>
                    <strong>Die Ottonen</strong>
                    <small>919 – 1024 | Die sächsische Dynastie</small>
                </div>
                <div class="topic-card" onclick="startApp('ww1')">
                    <i>🎖️</i>
                    <strong>1. Weltkrieg</strong>
                    <small>Heimatfront, Gesellschaft & Folgen</small>
                </div>
                <div class="topic-card" onclick="startGlobalExam()" style="border-color: var(--success);">
                    <i>🎓</i>
                    <strong>Abschlussprüfung</strong>
                    <small>Simulation: 20 Fragen (Mix)</small>
                </div>
            </div>
        </div>
    </div>

    <div id="app-interface">
        <div class="top-bar">
            <button onclick="goHome()" style="background:var(--btn-bg); color:white; border:1px solid var(--border); padding:8px 15px; border-radius:6px; cursor:pointer;">← Hauptmenü</button>
            <div id="active-title" style="color:white; font-weight:800; font-size:1.2rem; letter-spacing:1px;">TOPIC</div>
            <div style="width:100px"></div>
        </div>

        <div class="main-layout">
            <div class="sidebar" id="sidebar-nav"></div>
            <div class="content-area" id="content-display"></div>
        </div>
    </div>

    <div id="exam-interface" style="display:none;">
        <div class="top-bar">
            <button onclick="goHomeFromExam()" style="background:transparent; color:white; border:none; font-size:1.2rem; cursor:pointer;">✕ Abbruch</button>
            <div id="exam-progress" style="color:var(--primary); font-weight:bold;">Frage 1 / 20</div>
            <div style="width:60px"></div>
        </div>
        
        <div class="exam-container">
            <div id="exam-card" class="card" style="margin-top: 80px; text-align:center;">
                </div>
            
            <div id="exam-feedback" class="card" style="display:none; border-color: var(--primary);">
                </div>

            <button id="next-q-btn" class="next-btn" style="display:none;" onclick="nextExamQuestion()">Nächste Frage ➔</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
